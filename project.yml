name: Muter
options:
  bundleIdPrefix: com.pedro
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_KEY_UILaunchScreen_Generation: true
    INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Muter needs your location to generate walking routes nearby."
    INFOPLIST_KEY_NSCameraUsageDescription: "Muter uses the camera to capture photos during your walks."
    INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Muter saves walk photos to your photo library."
    INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "Muter saves walk collages to your photo library."

targets:
  Muter:
    type: application
    platform: iOS
    sources:
      - Muter
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pedro.muter
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: Muter

  MuterTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - MuterTests
    dependencies:
      - target: Muter
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pedro.muter.tests
        GENERATE_INFOPLIST_FILE: true
