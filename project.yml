name: Looopr
options:
  bundleIdPrefix: nl.astrontech
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  Looopr:
    type: application
    platform: iOS
    sources:
      - path: Looopr
        excludes:
          - "Inactive/**"
          - "website/**"
      # Shared with the LoooprLiveActivity widget extension so the main app
      # can reference the Activity<WalkActivityAttributes> type when starting
      # and updating the Live Activity from LiveActivityManager.
      - path: LoooprLiveActivity/WalkActivityAttributes.swift
    configFiles:
      Debug: Looopr/Secrets.xcconfig
      Release: Looopr/Secrets.xcconfig
    info:
      path: Looopr/Info.plist
      properties:
        CFBundleDisplayName: Looopr
        UILaunchScreen:
          UIColorName: LaunchBackground
          UIImageName: LoooprLogo
        NSLocationWhenInUseUsageDescription: "Looopr needs your location to generate walking routes nearby."
        NSMotionUsageDescription: "Looopr counts your steps during walks to show your activity."
        NSSupportsLiveActivities: true
        NSSupportsLiveActivitiesFrequentUpdates: true
        CFBundleURLTypes:
          - CFBundleURLName: nl.astrontech.looopr
            CFBundleURLSchemes:
              - looopr
        GOOGLE_PLACES_API_KEY: $(GOOGLE_PLACES_API_KEY)
        MAPBOX_ACCESS_TOKEN: $(MAPBOX_ACCESS_TOKEN)
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        VIATOR_API_KEY: $(VIATOR_API_KEY)
        GETYOURGUIDE_API_KEY: $(GETYOURGUIDE_API_KEY)
        TIQETS_API_KEY: $(TIQETS_API_KEY)
        MUSEMENT_API_KEY: $(MUSEMENT_API_KEY)
        KLOOK_API_KEY: $(KLOOK_API_KEY)
    preBuildScripts:
      - name: "XcodeGen — sync project.yml"
        script: |
          if which xcodegen > /dev/null 2>&1; then
            cd "${SRCROOT}" && xcodegen generate --quiet
          else
            echo "warning: xcodegen not found — run: brew install xcodegen"
          fi
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: nl.astrontech.looopr
        CODE_SIGN_ENTITLEMENTS: Looopr/Looopr.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GOOGLE_PLACES_API_KEY: $(GOOGLE_PLACES_API_KEY)
        MAPBOX_ACCESS_TOKEN: $(MAPBOX_ACCESS_TOKEN)
    dependencies:
      - package: Supabase
      - target: LoooprLiveActivity
        embed: true

  LoooprLiveActivity:
    type: app-extension
    platform: iOS
    sources:
      - path: LoooprLiveActivity
    info:
      path: LoooprLiveActivity/Info.plist
      properties:
        CFBundleDisplayName: LoooprLiveActivity
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: nl.astrontech.looopr.LoooprLiveActivity
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SKIP_INSTALL: YES

  LoooprTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - MuterTests
    dependencies:
      - target: Looopr
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: nl.astrontech.looopr.tests
        GENERATE_INFOPLIST_FILE: true
