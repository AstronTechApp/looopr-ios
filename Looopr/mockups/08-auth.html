<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Looopr — Sign In</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        "primary": "#176a21", "primary-container": "#9df197", "primary-dim": "#025d16",
        "on-primary": "#d1ffc8",
        "secondary": "#9b3f00", "secondary-container": "#ffc5aa",
        "surface": "#f5f7f3", "surface-container-lowest": "#ffffff", "surface-container-low": "#eff1ed",
        "surface-container": "#e6e9e5", "surface-variant": "#daded9",
        "on-surface": "#2c2f2d", "on-surface-variant": "#595c59",
        "outline": "#747875", "outline-variant": "#abaeaa",
        "error": "#b02500",
      },
      fontFamily: { "sans": ["Plus Jakarta Sans", "system-ui"] },
      borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
    },
  },
}
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .filled { font-variation-settings: 'FILL' 1; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; max-width: 430px; margin: 0 auto; min-height: 100dvh; display: flex; flex-direction: column; }
  .editorial-shadow { box-shadow: 0 10px 40px -10px rgba(23,106,33,0.08); }
</style>
</head>
<body class="bg-surface text-on-surface">

<main class="flex-1 flex flex-col px-6 pb-10 pt-6">

  <!-- Spacer top -->
  <div class="flex-1"></div>

  <!-- Logo + Welcome text -->
  <div class="text-center space-y-4 mb-8">
    <div class="w-24 h-24 bg-primary/10 rounded-[28px] flex items-center justify-center mx-auto editorial-shadow">
      <span class="material-symbols-outlined text-primary filled text-5xl">hiking</span>
    </div>

    <div class="space-y-2">
      <h1 class="text-[28px] font-extrabold tracking-tight">Welcome to Looopr</h1>
      <p class="text-base text-on-surface-variant font-medium">Discover walking routes<br/>around you</p>
    </div>
  </div>

  <!-- Spacer middle -->
  <div class="flex-1"></div>
  <div class="flex-1"></div>

  <!-- Sign in buttons -->
  <div class="space-y-3 mb-5">

    <!-- Apple Sign In -->
    <button class="w-full h-14 bg-on-surface text-white rounded-full font-bold text-[17px] flex items-center justify-center gap-3 active:scale-[0.98] transition-transform editorial-shadow">
      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
        <path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
      </svg>
      Sign in with Apple
    </button>

    <!-- Google Sign In -->
    <button class="w-full h-14 bg-surface-container-lowest rounded-full font-bold text-[17px] text-on-surface flex items-center justify-center gap-3 active:scale-[0.98] transition-transform editorial-shadow" style="border: 1px solid rgba(171,174,170,0.3)">
      <span class="text-xl font-bold" style="color: #4285F4;">G</span>
      Sign in with Google
    </button>

  </div>

  <!-- Loading state placeholder -->
  <div class="h-5 mb-4"></div>

  <!-- GDPR consent notice -->
  <p class="text-[11px] text-on-surface-variant text-center leading-relaxed mb-2">
    By signing in, you agree to our <a href="#" class="text-primary font-semibold underline underline-offset-2">Privacy Policy</a>. We collect your name, email, saved routes, and walk history to provide the service.
  </p>

</main>

</body>
</html>
